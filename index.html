<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Keirin AI</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121c33;
      --line: #243352;
      --text: #ffffff;
      --muted: #9fb0d1;
      --accent: #2563eb;
      --good-bg: rgba(22, 163, 74, 0.18);
      --warn-bg: rgba(245, 158, 11, 0.16);
      --danger-bg: rgba(239, 68, 68, 0.16);
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #08111f 0%, #0d1730 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    body { min-height: 100vh; }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }
    header { margin-bottom: 16px; }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px var(--shadow);
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    h3 {
      margin: 14px 0 8px;
      font-size: 15px;
      color: #dce7ff;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0d162b;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    textarea {
      resize: vertical;
      min-height: 140px;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22);
    }
    ::placeholder { color: #7f92b7; }

    .buttonRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }
    button.secondary {
      background: #233453;
      color: #d9e6ff;
    }

    .grid {
      display: grid;
      gap: 12px;
    }
    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }
    .hidden {
      display: none !important;
    }

    .tableWrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0d162b;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    thead {
      background: #13203b;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th {
      color: #dbe8ff;
      font-weight: 700;
      white-space: nowrap;
    }
    td { color: #f5f9ff; }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }
    li {
      margin: 6px 0;
      color: #eef4ff;
    }

    #structureText,
    #conclusionText,
    #csvPreview {
      background: #0d162b;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      min-height: 52px;
      color: #f7fbff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bet-main {
      background: var(--good-bg);
      border: 1px solid rgba(22, 163, 74, 0.45);
      border-radius: 10px;
      padding: 8px 10px;
      list-style: none;
      margin: 8px 0;
    }
    .bet-sub {
      background: var(--warn-bg);
      border: 1px solid rgba(245, 158, 11, 0.45);
      border-radius: 10px;
      padding: 8px 10px;
      list-style: none;
      margin: 8px 0;
    }

    .score-high { background: rgba(22, 163, 74, 0.12); }
    .score-mid { background: rgba(37, 99, 235, 0.10); }
    .score-low { background: rgba(255, 255, 255, 0.02); }

    .hit-main,
    .hit-sub,
    .hit-miss {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
    }
    .hit-main {
      background: var(--good-bg);
      border: 1px solid rgba(22, 163, 74, 0.45);
      color: #d8ffe4;
    }
    .hit-sub {
      background: var(--warn-bg);
      border: 1px solid rgba(245, 158, 11, 0.45);
      color: #ffe9b5;
    }
    .hit-miss {
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #ffd5d5;
    }

    @media (max-width: 720px) {
      .container { padding: 12px; }
      h1 { font-size: 24px; }
      .card { padding: 14px; border-radius: 14px; }
      .grid.two { grid-template-columns: 1fr; }
      button { width: 100%; }
      .buttonRow { flex-direction: column; }
      table { min-width: 820px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Keirin-AI β</h1>
      <p class="subtitle">元データ貼り付け → CSV変換 → 並び入力 → AI判定</p>
    </header>

    <section class="card">
      <h2>① 元データ入力</h2>
      <label for="rawInput">元データをそのまま貼り付け</label>
      <textarea id="rawInput" rows="12" placeholder="元データをそのまま貼り付け"></textarea>

      <div class="buttonRow">
        <button id="convertBtn" type="button">変換する</button>
        <button id="sampleRawBtn" type="button" class="secondary">変換サンプル</button>
      </div>

      <h3>変換結果（CSV）</h3>
      <div id="csvPreview">ここにCSVが出ます</div>
    </section>

    <section class="card">
      <h2>② AI入力</h2>

      <label for="raceName">開催・レース名</label>
      <input id="raceName" type="text" placeholder="例: 小倉 ミッドナイト 8R" />

      <label for="csvInput">出走データ（CSV）</label>
      <textarea id="csvInput" rows="10" placeholder="変換結果がここに入ります"></textarea>

      <label for="lineInput">並び</label>
      <input id="lineInput" type="text" placeholder="例: 1-4-5-6/2-7/3" />

      <div class="buttonRow">
        <button id="analyzeBtn" type="button">AI判定</button>
        <button id="sampleBtn" type="button" class="secondary">AIサンプル</button>
        <button id="clearBtn" type="button" class="secondary">全クリア</button>
      </div>
    </section>

    <section class="card" id="resultCard">
      <h2>③ AI結果</h2>

      <div id="resultEmpty" class="muted">
        データを入れて「AI判定」を押してください。
      </div>

      <div id="result" class="hidden">
        <div class="grid two">
          <div>
            <h3>レース構造</h3>
            <div id="structureText"></div>
          </div>
          <div>
            <h3>結論</h3>
            <div id="conclusionText"></div>
          </div>
        </div>

        <div class="grid two">
          <div>
            <h3>本線</h3>
            <ul id="mainLine"></ul>
          </div>
          <div>
            <h3>対抗・押さえ</h3>
            <ul id="subLine"></ul>
          </div>
        </div>

        <h3>選手スコア</h3>
        <div class="tableWrap">
          <table id="scoreTable">
            <thead>
              <tr>
                <th>車番</th>
                <th>前取り</th>
                <th>主導権</th>
                <th>番手価値</th>
                <th>後出し力</th>
                <th>格上</th>
                <th>単騎化</th>
                <th>総合</th>
                <th>メモ</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>④ 的中結果入力</h2>

      <label for="actualResult">実際の結果（3連単）</label>
      <input id="actualResult" type="text" placeholder="例: 1-4-6" />

      <div class="buttonRow">
        <button id="checkResultBtn" type="button">的中チェック</button>
      </div>

      <div id="hitResult" class="muted">結果を入れて「的中チェック」を押してください。</div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let latestResult = null;

    function splitLines(text) {
  return text
    .replace(/\u00A0/g, " ")
    .replace(/\t/g, "\n")
    .replace(/　/g, " ")
    .split(/\r?\n/)
    .map(s => s.trim())
    .filter(Boolean);
}

function isNum(s) {
  return /^-?\d+(\.\d+)?$/.test(s);
}

function normalizeCar(raw) {
  const s = String(raw).trim();
  if (/^([1-9])\1$/.test(s)) return parseInt(s[0], 10);
  if (/^[1-9]$/.test(s)) return parseInt(s, 10);
  return null;
}

function formatVal(v, digits = 2) {
  if (v === '' || v === null || typeof v === 'undefined') return '';
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(digits) : '';
}
      
      
function convertTableStyle(lines) {
  const rows = [];

  for (let i = 0; i < lines.length; i++) {
    let profileIdx = -1;
    let scoreIdx = -1;
    let styleIdx = -1;

    for (let j = i; j < Math.min(i + 12, lines.length); j++) {
      const line = lines[j] || "";

      if (profileIdx === -1 && line.includes("/")) {
        profileIdx = j;
      }

      if (scoreIdx === -1 && /^\d{2,3}\.\d{2}$/.test(line)) {
        scoreIdx = j;
      }

      if (styleIdx === -1 && /^(逃|追|両)$/.test(line)) {
        styleIdx = j;
      }
    }

    if (profileIdx === -1 || scoreIdx === -1 || styleIdx === -1) continue;
    if (!(profileIdx < scoreIdx && scoreIdx < styleIdx)) continue;

    // 車番判定
    // profile の直前にある 1桁数字を優先
    // 2個あるときは後ろを車番として採用
    const carCandidates = [];
    for (let p = Math.max(0, profileIdx - 2); p < profileIdx; p++) {
      const n = normalizeCar(lines[p]);
      if (n !== null) carCandidates.push(n);
    }

    if (!carCandidates.length) continue;
    const carNo = carCandidates[carCandidates.length - 1];

    const score = parseFloat(lines[scoreIdx]);
    const style = lines[styleIdx];

    const nums = [];
    let k = styleIdx + 1;

    while (k < lines.length && nums.length < 13) {
      if (isNum(lines[k])) nums.push(parseFloat(lines[k]));
      k++;
    }

    if (nums.length < 13) continue;

    rows.push({
      car: carNo,
      score,
      b: nums[5],
      s: nums[4],
      style,
      win: nums[10],
      ren2: nums[11],
      ren3: nums[12]
    });

    i = k - 1;
  }

  return rows;
}
function convertLinkedStyle(lines) {
  const rows = [];

  for (let i = 0; i < lines.length; i++) {
    const car = normalizeCar(lines[i]);
    if (car === null) continue;

    const candidates = [
      lines[i + 1] || "",
      lines[i + 2] || "",
      lines[i + 3] || "",
      lines[i + 4] || "",
      lines[i + 5] || ""
    ];

    let dataLine = "";
    for (const line of candidates) {
      if (/\d{2,3}\.\d{2}/.test(line) && /(逃|追|両)/.test(line)) {
        dataLine = line;
        break;
      }
    }

    if (!dataLine) continue;

    const m = dataLine.match(/([◎○▲△×注]?)(\d{2,3}\.\d{2})(逃|追|両)(.*)/);
    if (!m) continue;

    const score = parseFloat(m[2]);
    const style = m[3];
    const tail = m[4] || "";

    const nums = tail.match(/\d+\.\d+|\d+/g) || [];
    if (nums.length < 13) continue;

    rows.push({
      car,
      score,
      b: Number(nums[5]),
      s: Number(nums[4]),
      style,
      win: Number(nums[10]),
      ren2: Number(nums[11]),
      ren3: Number(nums[12])
    });
  }

  return rows;
}

function convertRawToCsv(raw) {
  const lines = splitLines(raw);

  let rows = convertTableStyle(lines);

  if (!rows.length) {
    rows = convertLinkedStyle(lines);
  }

  // 最終フォールバック:
  // 元データ全体を1本の文字列として見て、車番ブロックを抽出
  if (!rows.length) {
    const joined = lines.join("\n");

    const blockRegex = /(?:^|\n)([1-9])\n(?:[1-9]\n)?([^\n]+)\n([^\n]*\/[^\n]*)\n([◎○▲△×注]?)\n?(\d{2,3}\.\d{2})\n?(逃|追|両)\n?([\s\S]*?)(?=(?:\n[1-9]\n(?:[1-9]\n)?[^\n]+\n[^\n]*\/)|$)/g;
    let m;

    while ((m = blockRegex.exec(joined)) !== null) {
      const car = Number(m[1]);
      const score = Number(m[5]);
      const style = m[6];
      const tail = m[7] || "";

      const nums = tail.match(/\d+\.\d+|\d+/g) || [];
      if (nums.length < 13) continue;

      rows.push({
        car,
        score,
        b: Number(nums[5]),
        s: Number(nums[4]),
        style,
        win: Number(nums[10]),
        ren2: Number(nums[11]),
        ren3: Number(nums[12])
      });
    }
  }

  const rowMap = new Map();
  rows.forEach(r => {
    if (
      r &&
      Number.isFinite(r.car) &&
      Number.isFinite(r.score) &&
      ["逃", "追", "両"].includes(r.style)
    ) {
      rowMap.set(r.car, r);
    }
  });

  rows = [...rowMap.values()].sort((a, b) => a.car - b.car);

  if (!rows.length) return "";

  return [
    "車番,得点,B,S,脚質,勝率,2連対率,3連対率",
    ...rows.map(r => [
      r.car,
      formatVal(r.score, 2),
      r.b === "" ? "" : r.b,
      r.s === "" ? "" : r.s,
      r.style,
      formatVal(r.win, 1),
      formatVal(r.ren2, 1),
      formatVal(r.ren3, 1)
    ].join(","))
  ].join("\n");
}

      function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) return [];

        const headers = lines[0].split(',').map(h => h.trim());

        return lines.slice(1).map(line => {
          const cols = line.split(',').map(c => c.trim());
          const obj = {};
          headers.forEach((h, i) => { obj[h] = cols[i]; });

          return {
            num: Number(obj['車番']),
            score: Number(obj['得点']),
            B: Number(obj['B']),
            S: Number(obj['S']),
            style: obj['脚質'],
            win: Number(obj['勝率']),
            quinella: Number(obj['2連対率']),
            trio: Number(obj['3連対率'])
          };
        }).filter(r => !Number.isNaN(r.num));
      }

      function parseLineup(text) {
        return text
          .split('/')
          .map(t => t.trim())
          .filter(Boolean)
          .map(team =>
            team
              .split('-')
              .map(v => Number(v.trim()))
              .filter(v => !Number.isNaN(v))
          );
      }

      function teamMap(lineup) {
        const map = new Map();
        lineup.forEach((team, i) => {
          team.forEach((num, j) => {
            map.set(num, { team: i, pos: j });
          });
        });
        return map;
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function scoreRacer(r, pos, maxB, maxS) {
        const front = clamp(
          ((r.S / Math.max(1, maxS)) * 2) + (pos?.pos === 0 ? 0.5 : 0),
          0, 3
        );

        const initiative = clamp(
          ((r.B / Math.max(1, maxB)) * 2) + (r.style === '逃' ? 0.8 : r.style === '両' ? 0.4 : 0),
          0, 3
        );

        const anchor = clamp(
          (pos?.pos === 1 ? 1.2 : pos?.pos === 2 ? 0.6 : 0) +
          (r.quinella / 50),
          0, 3
        );

        const late = clamp(
          (r.win / 40) + (r.style === '両' ? 0.8 : r.style === '追' ? 0.4 : 0),
          0, 3
        );

        const elite = clamp(
          (r.win / 35) + (r.quinella / 60) + (r.score / 110),
          0, 3
        );

        const soloRisk = clamp(
          (pos?.pos === 1 ? 1.0 : 0) +
          (r.B >= 8 ? 0.5 : 0),
          0, 3
        );

        const total =
          front * 0.15 +
          initiative * 0.25 +
          anchor * 0.20 +
          late * 0.15 +
          elite * 0.20 -
          soloRisk * 0.10;

        return {
          front,
          initiative,
          anchor,
          late,
          elite,
          soloRisk,
          total: Number(total.toFixed(2))
        };
      }

      function uniq(arr) {
        return [...new Set(arr.filter(Boolean))];
      }

      function analyzeRace(racers, lineup) {
        if (!racers.length) throw new Error('選手データがありません。');

        const maxB = Math.max(...racers.map(r => r.B));
        const maxS = Math.max(...racers.map(r => r.S));
        const posMap = teamMap(lineup);

        const scored = racers.map(r => {
          const pos = posMap.get(r.num);
          return { ...r, pos, ai: scoreRacer(r, pos, maxB, maxS) };
        });

        const leaders = scored.filter(r => r.ai.initiative >= 2);

        let structure = '安定戦';
        if (leaders.length >= 3) structure = '踏み合い戦';
        else if (leaders.length === 2) structure = '崩壊戦';

        const byTotal = [...scored].sort((a, b) => b.ai.total - a.ai.total);
        const byInitiative = [...scored].sort(
          (a, b) => (b.ai.initiative + b.ai.front) - (a.ai.initiative + a.ai.front)
        );
        const byAnchor = [...scored].sort((a, b) => b.ai.anchor - a.ai.anchor);
        const byLate = [...scored].sort((a, b) => b.ai.late - a.ai.late);

        const leader = byInitiative[0];
        const bestAnchor = byAnchor[0];
        const bestLate = byLate[0];

        let head = byTotal[0];
        if (structure === '踏み合い戦') head = bestLate;
        else if (
          structure === '安定戦' &&
          bestAnchor?.pos?.pos === 1 &&
          leader &&
          bestAnchor.pos?.team === leader.pos?.team
        ) {
          head = bestAnchor;
        } else if (structure === '崩壊戦' && bestLate) {
          head = bestLate;
        }

        const sameTeam = scored
          .filter(r => r.pos?.team === head.pos?.team && r.num !== head.num)
          .sort((a, b) => (a.pos?.pos ?? 99) - (b.pos?.pos ?? 99));

        const others = scored
          .filter(r => r.num !== head.num && !sameTeam.some(x => x.num === r.num))
          .sort((a, b) => b.ai.total - a.ai.total);

        const teamMate1 = sameTeam[0]?.num;
        const teamMate2 = sameTeam[1]?.num;
        const other1 = others[0]?.num;
        const other2 = others[1]?.num;
        const other3 = others[2]?.num;

        const main = uniq([
          `${head.num}-${teamMate1 || other1}-${teamMate2 || other2 || ''}`,
          `${head.num}-${other1}-${teamMate1 || other2 || ''}`,
          `${head.num}-${other1}-${other2 || teamMate1 || ''}`
        ]).filter(v => v.split('-').length === 3 && !v.includes('undefined'));

        const sub = uniq([
          leader && leader.num !== head.num
            ? `${leader.num}-${head.num}-${bestAnchor?.num || other1 || ''}`
            : '',
          bestAnchor && bestAnchor.num !== head.num
            ? `${bestAnchor.num}-${head.num}-${leader?.num || other1 || ''}`
            : '',
          other2 ? `${head.num}-${other2}-${other3 || teamMate1 || ''}` : ''
        ]).filter(v => v.split('-').length === 3 && !v.includes('undefined'));

        const conclusion =
          `${head.num}頭を本線。` +
          `${leader?.num !== head.num ? ` 主導権候補は${leader?.num}。` : ''}` +
          `${bestAnchor?.num && bestAnchor.num !== head.num ? ` 番手価値は${bestAnchor.num}が高め。` : ''}`;

        const structureText =
          `レース構造: ${structure} / ` +
          `主導権候補: ${leader?.num ?? '-'} / ` +
          `後出し最上位: ${bestLate?.num ?? '-'} / ` +
          `番手価値上位: ${bestAnchor?.num ?? '-'}`;

        return { scored: byTotal, structureText, conclusion, main, sub };
      }

      function scoreClass(total) {
        if (total >= 1.9) return 'score-high';
        if (total >= 1.5) return 'score-mid';
        return 'score-low';
      }

      function render(result) {
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('resultEmpty').classList.add('hidden');

        document.getElementById('structureText').textContent = result.structureText;
        document.getElementById('conclusionText').textContent = result.conclusion;

        document.getElementById('mainLine').innerHTML =
          result.main.map(v => `<li class="bet-main">${v}</li>`).join('');

        document.getElementById('subLine').innerHTML =
          result.sub.map(v => `<li class="bet-sub">${v}</li>`).join('');

        const scoreTableBody = document.querySelector('#scoreTable tbody');
        scoreTableBody.innerHTML = '';

        result.scored.forEach(r => {
          const tr = document.createElement('tr');
          tr.className = scoreClass(r.ai.total);

          const memo = [
            r.pos ? `ライン${r.pos.team + 1}-${r.pos.pos + 1}番手` : '単騎',
            r.style,
            `得点${r.score}`
          ].join(' / ');

          tr.innerHTML = `
            <td>${r.num}</td>
            <td>${r.ai.front.toFixed(1)}</td>
            <td>${r.ai.initiative.toFixed(1)}</td>
            <td>${r.ai.anchor.toFixed(1)}</td>
            <td>${r.ai.late.toFixed(1)}</td>
            <td>${r.ai.elite.toFixed(1)}</td>
            <td>${r.ai.soloRisk.toFixed(1)}</td>
            <td>${r.ai.total.toFixed(2)}</td>
            <td>${memo}</td>
          `;
          scoreTableBody.appendChild(tr);
        });
      }

      function checkHit() {
        const actual = (document.getElementById('actualResult').value || '').trim();
        const hitResult = document.getElementById('hitResult');

        if (!actual) {
          hitResult.className = 'muted';
          hitResult.textContent = '結果を入力してください。';
          return;
        }

        if (!latestResult) {
          hitResult.className = 'muted';
          hitResult.textContent = '先にAI判定をしてください。';
          return;
        }

        const allPreds = [...latestResult.main, ...latestResult.sub];
        const isMainHit = latestResult.main.includes(actual);
        const isSubHit = latestResult.sub.includes(actual);
        const isHit = allPreds.includes(actual);

        if (isMainHit) {
          hitResult.className = 'hit-main';
          hitResult.textContent = `◎ 本線的中: ${actual}`;
        } else if (isSubHit || isHit) {
          hitResult.className = 'hit-sub';
          hitResult.textContent = `○ 対抗・押さえ的中: ${actual}`;
        } else {
          hitResult.className = 'hit-miss';
          hitResult.textContent = `× 不的中: ${actual}`;
        }
      }

      document.getElementById('convertBtn').addEventListener('click', () => {
        const raw = document.getElementById('rawInput').value.trim();
        if (!raw) {
          document.getElementById('csvPreview').textContent = '元データを貼ってください。';
          return;
        }

        const csv = convertRawToCsv(raw);
        if (!csv) {
          document.getElementById('csvPreview').textContent =
            '変換できませんでした。元データの貼り付け範囲を広げてください。';
          return;
        }

        document.getElementById('csvPreview').textContent = csv;
        document.getElementById('csvInput').value = csv;
      });

      document.getElementById('sampleRawBtn').addEventListener('click', fillRawSample);
      document.getElementById('sampleBtn').addEventListener('click', fillAiSample);

      document.getElementById('analyzeBtn').addEventListener('click', () => {
        try {
          const racers = parseCSV(document.getElementById('csvInput').value || '');
          const lineup = parseLineup(document.getElementById('lineInput').value || '');

          if (!racers.length || !lineup.length) {
            alert('CSVと並びを入力してください。');
            return;
          }

          const result = analyzeRace(racers, lineup);
          latestResult = result;
          render(result);
        } catch (e) {
          alert('エラー: ' + e.message);
        }
      });

      document.getElementById('checkResultBtn').addEventListener('click', checkHit);

      document.getElementById('clearBtn').addEventListener('click', () => {
        latestResult = null;
        document.getElementById('raceName').value = '';
        document.getElementById('rawInput').value = '';
        document.getElementById('csvInput').value = '';
        document.getElementById('csvPreview').textContent = 'ここにCSVが出ます';
        document.getElementById('lineInput').value = '';
        document.getElementById('actualResult').value = '';
        document.getElementById('hitResult').className = 'muted';
        document.getElementById('hitResult').textContent = '結果を入れて「的中チェック」を押してください。';
        document.getElementById('result').classList.add('hidden');
        document.getElementById('resultEmpty').classList.remove('hidden');
        document.getElementById('mainLine').innerHTML = '';
        document.getElementById('subLine').innerHTML = '';
        document.querySelector('#scoreTable tbody').innerHTML = '';
      });
    });
